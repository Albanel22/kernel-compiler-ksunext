name: Compilateur KernelSU Next Lineage 23.2 (sm8250)

on:
  workflow_dispatch: # Permet de lancer manuellement depuis l'onglet Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Installation des dépendances Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6
    
    - name: Création de l'espace de travail
      run: mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Téléchargement des Toolchains (Clang & GCC)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # Téléchargement de Clang
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main-kernel-build-2024 clang
        # Téléchargement de GCC 64-bit (Requis par Kconfig et l'assemblage pour sm8250)
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9 -b master gcc64

    - name: Clonage des sources du Noyau LineageOS sm8250
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # ETAPE CORRIGÉE : On télécharge les sources avant d'y injecter KernelSU
        git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 kernel-src

    - name: Injection de KernelSU Next (Branche Legacy)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Configuration du defconfig (vendor)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        
        # Choix du chemin du defconfig
        export DEFCONFIG_PATH="arch/arm64/configs/vendor/sm8250_defconfig"
        
        if [ ! -f "$DEFCONFIG_PATH" ]; then
            DEFCONFIG_PATH="arch/arm64/configs/sm8250_defconfig"
        fi
        
        cat << EOF >> $DEFCONFIG_PATH
        CONFIG_MODULES=y
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        EOF

    - name: Compilation du Noyau
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        
        # 1. Création d'un dossier temporaire pour nos alias de compilateurs
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace/bin_compat
        
        # 2. Création du lien symbolique : on fait pointer 'gcc' vers 'clang'
        ln -sf $GITHUB_WORKSPACE/kernel_workspace/clang/bin/clang $GITHUB_WORKSPACE/kernel_workspace/bin_compat/aarch64-linux-android-gcc
        
        # 3. Ajout du dossier de compatibilité ET de Clang dans le PATH
        export PATH="$GITHUB_WORKSPACE/kernel_workspace/bin_compat:$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$GITHUB_WORKSPACE/kernel_workspace/gcc64/bin:$PATH"
        
        # Variables d'architecture globales
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        
        # Génération de la configuration (le script trouvera enfin son binaire "fake" gcc)
        make O=out vendor/sm8250_defconfig || make O=out sm8250_defconfig
        
        # Compilation finale
        LTO=thin make O=out -j$(nproc)

    - name: Téléversement du Noyau Compilé (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel_KernelSU_Next_sm8250
        path: ${{ github.workspace }}/kernel_workspace/kernel-src/out/arch/arm64/boot/Image.gz
