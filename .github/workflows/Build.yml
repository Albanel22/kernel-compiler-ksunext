name: Compilateur KernelSU Next Lineage 23.2 (sm8250)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Installation des dÃĐpendances Linux
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo6

    - name: CrÃĐation de l'espace de travail et TÃĐlÃĐchargement de Clang (LLVM)
      run: |
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace
        cd $GITHUB_WORKSPACE/kernel_workspace
        # TÃĐlÃĐchargement de la toolchain Clang/LLVM officielle d'AOSP (uniquement la branche kernel)
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main-kernel-build-2024 clang

    - name: Clonage des sources du Noyau LineageOS sm8250
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 https://github.com/LineageOS/android_kernel_motorola_sm8250.git -b lineage-23.2 kernel-src

    - name: Injection de KernelSU Next (Branche Legacy)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Configuration et Patch du Defconfig (vendor/kona-perf_defconfig)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        
        TARGET_CONFIG="arch/arm64/configs/vendor/kona-perf_defconfig"
        
        if [ -f "$TARGET_CONFIG" ]; then
          echo "Correction de l'alignement et injection des options KernelSU Next..."
          
          # 1. Saut de ligne initial pour ÃĐviter les conflits d'alignement + Kprobes requis
          cat << EOF >> $TARGET_CONFIG

CONFIG_KPROBES=y
CONFIG_HAVE_KPROBES=y
CONFIG_KPROBE_EVENTS=y
CONFIG_MODULES=y
EOF
          
          # 2. DÃĐsactivation du CFI Clang pour empÃŠcher les bootloops de sÃĐcuritÃĐ sur Android 16
          sed -i 's/CONFIG_CFI_CLANG=y/# CONFIG_CFI_CLANG is not set/g' $TARGET_CONFIG
          
          # 3. DÃĐsactivation des signatures de modules obligatoires
          sed -i 's/CONFIG_MODULE_SIG=y/# CONFIG_MODULE_SIG is not set/g' $TARGET_CONFIG
          sed -i 's/CONFIG_MODULE_SIG_FORCE=y/# CONFIG_MODULE_SIG_FORCE is not set/g' $TARGET_CONFIG
          
          echo "Patch de configuration appliquÃĐ avec succÃĻs."
        else
          echo "Erreur : Le fichier $TARGET_CONFIG est introuvable !"
          exit 1
        fi

    - name: Compilation Unique du Noyau avec LLVM Natif
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        
        # Ciblage du sous-dossier clang standardisÃĐ dans linux-x86
        CLANG_BIN="$GITHUB_WORKSPACE/kernel_workspace/clang/clang-r522817/bin"
        if [ ! -d "$CLANG_BIN" ]; then
            # SÃĐcuritÃĐ si le dossier r522817 change de nom dans le dÃĐpÃīt distant
            CLANG_BIN=$(dirname $(find $GITHUB_WORKSPACE/kernel_workspace/clang -name clang -type f | head -n 1))
        fi
        
        export PATH="$CLANG_BIN:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        
        # DÃĐfinition des variables globales pour le compilateur
        export CC="clang"
        export LD="ld.lld"
        export AR="llvm-ar"
        export NM="llvm-nm"
        export OBJCOPY="llvm-objcopy"
        export OBJDUMP="llvm-objdump"
        export STRIP="llvm-strip"
        
        echo "Utilisation de la Toolchain situÃĐe dans : $CLANG_BIN"
        
        # Ãtape 1 : GÃĐnÃĐration du fichier .config Ã  partir de la cible de production Motorola
        make O=out LLVM=1 LLVM_IAS=1 \
          CC=$CLANG_BIN/clang \
          LD=$CLANG_BIN/ld.lld \
          AR=$CLANG_BIN/llvm-ar \
          NM=$CLANG_BIN/llvm-nm \
          OBJCOPY=$CLANG_BIN/llvm-objcopy \
          OBJDUMP=$CLANG_BIN/llvm-objdump \
          STRIP=$CLANG_BIN/llvm-strip \
          vendor/kona-perf_defconfig
        
        # Ãtape 2 : Compilation finale avec optimisation ThinLTO
        LTO=thin make O=out LLVM=1 LLVM_IAS=1 \
          CC=$CLANG_BIN/clang \
          LD=$CLANG_BIN/ld.lld \
          AR=$CLANG_BIN/llvm-ar \
          NM=$CLANG_BIN/llvm-nm \
          OBJCOPY=$CLANG_BIN/llvm-objcopy \
          OBJDUMP=$CLANG_BIN/llvm-objdump \
          STRIP=$CLANG_BIN/llvm-strip \
          -j$(nproc)

    - name: TÃĐlÃĐversement du Noyau CompilÃĐ (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel_KernelSU_Next_sm8250
        path: ${{ github.workspace }}/kernel_workspace/kernel-src/out/arch/arm64/boot/Image*
