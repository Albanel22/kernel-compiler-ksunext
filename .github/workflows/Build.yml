name: Compilateur KernelSU Next 4.19

on:
  workflow_dispatch: # Permet de lancer la compilation manuellement en un clic

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Nettoyage et mise à jour de l'environnement
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.1-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev libtinfo5

    - name: Création de l'espace de travail
      run: mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Téléchargement de la Toolchain AOSP Clang
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone --depth=1 https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 -b main-kernel-build-2024 clang

    - name: Clonage des sources du Noyau 4.19
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        # REMPLACEZ l'URL et la branche par celles de votre appareil
        git clone --depth=1 https://github.com/VOTRE_DEPOT/VOTRE_KERNEL.git -b votre_branche_lineage kernel-src

    - name: Injection de KernelSU Next (Branche Legacy)
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s legacy

    - name: Configuration du defconfig
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        # REMPLACEZ "votre_appareil_defconfig" par le nom exact de votre fichier
        export DEFCONFIG_NAME="votre_appareil_defconfig"
        
        cat << EOF >> arch/arm64/configs/$DEFCONFIG_NAME
        CONFIG_MODULES=y
        CONFIG_KPROBES=y
        CONFIG_HAVE_KPROBES=y
        CONFIG_KPROBE_EVENTS=y
        EOF

    - name: Compilation du Noyau
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/kernel-src
        export PATH="$GITHUB_WORKSPACE/kernel_workspace/clang/bin:$PATH"
        export ARCH=arm64
        export SUBARCH=arm64
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-android-
        
        export DEFCONFIG_NAME="votre_appareil_defconfig"
        
        make O=out $DEFCONFIG_NAME
        LTO=thin make O=out -j$(nproc)

    - name: Téléversement du Noyau Compilé (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: Kernel_KernelSU_Next
        path: ${{ github.workspace }}/kernel_workspace/kernel-src/out/arch/arm64/boot/Image.gz
